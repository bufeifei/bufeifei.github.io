<html>
	<head>

		<!--引入jQuery框架-->
		<script type="text/javascript" src="js/jquery-1.9.1.min.js"></script>
		<!--引入jVectorMap库-->
		<script type="text/javascript" src="js/jquery-jvectormap-1.2.2.min.js"></script>
		<!--引入样式表-->
		<link href="js/jquery-jvectormap-1.2.2.css" rel="stylesheet" media="screen">


		<!--引入中国地图数据库-->
		<script type="text/javascript" src="js/jquery-jvectormap-cn-merc-en.js"></script>

		<!--引入美国地图数据库-->
		<!--script type="text/javascript" src="js/jquery-jvectormap-us-aea.js"></script-->
		<!--引入世界地图数据库-->
		<!--script type="text/javascript" src="js/jquery-jvectormap-world-mill.js"></script-->
		
		<!--移动端设备访问自动跳转到移动端页面-->
		<script src="http://siteapp.baidu.com/static/webappservice/uaredirect.js" type="text/JavaScript">
                </script>
                <script type="text/javascript">uaredirect("https://bufeifei.github.io/m");</script>

	</head>
<body>
	<!--background-color: 地图背景颜色-->
	<div id="map" style="background-color:#FFFFFF"> </div>
	<script>
		$('#map').vectorMap({

			// 此处更改地图
			map: 'cn_merc_en',   // 中国地图
			//map: 'us_aea',     // 美国地图
			//map: 'world_mill', // 世界地图


			backgroundColor: 'transparent',
			zoomMin: 1, // 鼠标缩放时的最小比例
			zoomMax: 1, // 鼠标缩放时的最大比例
			focusOn: {
				x: 0.55,
				y: 2,
				scale: 0.9
			},
			regionStyle: {
				initial: {
					fill: '#808080',   // 地图颜色
					"fill-opacity": 1, // 省份（州）是否隐藏，鼠标滑动时显示; 1：显示，2：隐藏。
					stroke: 'none',
					"stroke-width": 0,
					"stroke-opacity": 1
				},
				hover: {
					fill: '#E3E3E3',  // 鼠标滑动至某省份的高亮颜色。
					"fill-opacity": 0.8
				},
				selected: {
					fill: 'yellow'
				},
				selectedHover: {}
			},
			markerStyle: {
		        initial: {
		            fill: '#FF5858', // 足迹位置的填充颜色
		            stroke: '#fff'   // 足迹位置的描边颜色
		        },
				hover: {
					fill: '#fd2020', // 鼠标滑动至足迹位置后的填充颜色
					stroke: '#fff',  // 鼠标滑动至足迹位置后的描边颜色
					"fill-opacity": 0.8
				},
		    },
			markers: [ // 足迹位置

				// {latLng: [经度（保留两位小数）, 纬度（保留两位小数）], name: '城市名称'},
				// 推荐查询经纬度网站：http://www.gpsspg.com/maps.htm

		        {latLng: [31.15, 121.50], name: '上海'},
		        {latLng: [30.65, 104.08], name: '成都 2018.4.5'},
			{latLng: [31.11, 121.05], name: '朱家角 2018.6.9'},
		        {latLng: [30.72, 122.82], name: '枸杞岛 2018.6.16'},
			{latLng: [29.94, 119.30], name: '桐庐 2018.7.13'},
		        {latLng: [22.27, 114.15], name: '香港 2018.9.21'},
		        {latLng: [25.41, 107.88], name: '贵州 2018.9.30'},
			{latLng: [30.94, 120.89], name: '西塘 2018.10.27'},
		    ]
		});
	</script>
</html>
